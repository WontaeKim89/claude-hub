<!doctype html>
<html lang="ko" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="ko" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClaudeHub</title>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen (replaced by React) -->
      <div style="display:flex;height:100vh;background:#09090b;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none"><rect x="1" y="1" width="30" height="30" rx="8" fill="#09090b" stroke="#27272a" stroke-width="1"/><circle cx="10" cy="16" r="3" fill="#fb7185" fill-opacity="0.85"/><circle cx="16" cy="16" r="3" fill="#e879f9" fill-opacity="0.5"/><circle cx="22" cy="16" r="3" fill="#a78bfa" fill-opacity="0.3"/></svg>
        <div style="font-family:monospace;font-size:13px;font-weight:700;color:#d4d4d8;">Claude<span style="color:#c084fc">Hub</span></div>
        <div style="width:120px;height:2px;background:#27272a;border-radius:4px;overflow:hidden;"><div style="width:40%;height:100%;background:#c084fc;border-radius:4px;animation:load 1.5s ease-in-out infinite;"></div></div>
        <style>@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
